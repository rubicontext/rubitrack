<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RubiTrack Overlay 2</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ffffff; color: #283C4F; padding: 10px 12px;
    overflow: hidden; user-select: none;
  }
  .ov-now { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .ov-onair { color: #e03131; font-weight: 800; font-size: 11px; letter-spacing: 1px; }
  .ov-key {
    display: inline-block; min-width: 30px; text-align: center; border-radius: 4px;
    padding: 1px 6px; font-weight: 800; font-size: 12px; color: #1e2a36;
  }
  .ov-key-sm { min-width: 26px; font-size: 11px; padding: 0 5px; }
  .ov-bpm { font-weight: 800; font-size: 14px; color: #283C4F; }
  .ov-bpm::after { content: " BPM"; font-size: 9px; color: #98a6b3; font-weight: normal; }
  .ov-title {
    font-size: 19px; font-weight: 800; line-height: 1.15; color: #283C4F;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ov-artist { font-size: 13px; color: #52a58a; margin-bottom: 6px;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* Sections repliables */
  .ov-sec { margin-top: 4px; }
  .ov-sec-head {
    font-size: 9px; letter-spacing: 1.5px; color: #98a6b3; font-weight: 700;
    padding: 3px 0; cursor: pointer;
  }
  .ov-sec-head:hover { color: #52a58a; }
  .ov-caret { display: inline-block; transition: transform .15s; font-size: 10px; }
  .ov-sec.collapsed .ov-caret { transform: rotate(-90deg); }
  .ov-sec.collapsed .ov-sec-body { display: none; }
  .ov-next { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 12px; }
  .ov-next-title { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden;
                   text-overflow: ellipsis; font-weight: 600; }
  .ov-next-meta { color: #98a6b3; font-size: 11px; white-space: nowrap; }
  .ov-empty { color: #98a6b3; font-size: 12px; margin-top: 2px; }
</style>
</head>
<body>
<div id="ov-content">
  {% include 'track/overlay/_overlay2_content.html' %}
</div>
<script>
  // État plié/déplié mémorisé (localStorage), survit au refresh et au reboot
  var LS_KEY = 'rubitrack-overlay2-collapsed';
  function collapsedSet() {
    try { return new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]')); }
    catch (e) { return new Set(); }
  }
  function applyCollapsed() {
    var set = collapsedSet();
    document.querySelectorAll('.ov-sec').forEach(function (sec) {
      sec.classList.toggle('collapsed', set.has(sec.dataset.sec));
    });
  }
  document.addEventListener('click', function (event) {
    var head = event.target.closest('.ov-sec-head');
    if (!head) { return; }
    var sec = head.parentElement;
    var set = collapsedSet();
    if (set.has(sec.dataset.sec)) { set.delete(sec.dataset.sec); }
    else { set.add(sec.dataset.sec); }
    localStorage.setItem(LS_KEY, JSON.stringify(Array.from(set)));
    applyCollapsed();
  });
  applyCollapsed();

  // Refresh sans flicker; l'état plié est réappliqué après chaque swap
  setInterval(function () {
    if (document.hidden) { return; }
    fetch('?partial=1', {cache: 'no-store'})
      .then(function (r) { return r.ok ? r.text() : null; })
      .then(function (html) {
        if (html) {
          document.getElementById('ov-content').innerHTML = html;
          applyCollapsed();
        }
      })
      .catch(function () {});
  }, 10000);
</script>
</body>
</html>
