name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff (imports inutilisés, erreurs)
        run: ruff check --select F --exclude "track/migrations" rubitrack/

      - name: Pytest (SQLite en mémoire via settings_test)
        working-directory: rubitrack
        run: pytest -q
